# ==============================================================================
# SELinux Lab Inventory File
# ==============================================================================
# INSTRUCTIONS:
# 1. Replace <YOUR_ROCKY_VM_IP> with the local IP address of your Rocky Linux system.
# 2. Replace <YOUR_SSH_USERNAME> with the user you use to log into the VM.
# ==============================================================================

[rocky_lab]
rocky_lab ansible_host=<YOUR_ROCKY_IP>

[rocky_lab:vars]
ansible_user=<YOUR_SSH_USER>
ansible_become=yes
ansible_become_method=sudo

# Note: Because ansible_become=yes is set, you will need to run your playbooks 
# with the -K flag (ansible-playbook -i inventory.ini playbook.yml -K) 
# so Ansible prompts you for the sudo password.
